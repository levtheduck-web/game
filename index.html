<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LEV ARCADE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #07070d;
    --bg2: #0d0d1a;
    --ink: #e9e9ff;
    --dim: #8a8aaa;
    --neon: #00ffd0;
    --neon2: #ff3df0;
    --neon3: #ffd400;
    --card: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(1200px 800px at 20% -10%, rgba(255,61,240,0.18), transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, rgba(0,255,208,0.12), transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    color: var(--ink);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    min-height: 100%;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 1000;
    mix-blend-mode: overlay;
  }

  /* ── HEADER ── */
  header {
    padding: 48px 32px 24px;
    text-align: center;
  }
  h1 {
    font-family: "Press Start 2P", ui-monospace, monospace;
    font-size: clamp(22px, 5vw, 56px);
    letter-spacing: 0.12em;
    color: var(--ink);
    text-shadow:
      0 0 4px var(--neon),
      0 0 16px var(--neon),
      0 0 32px rgba(0,255,208,0.4),
      2px 2px 0 var(--neon2);
    animation: flicker 4s infinite;
  }
  @keyframes flicker {
    0%, 92%, 100% { opacity: 1; }
    93% { opacity: 0.6; }
    94% { opacity: 1; }
    95% { opacity: 0.8; }
  }
  .sub {
    color: var(--dim);
    margin: 12px 0 0;
    letter-spacing: 0.3em;
    font-size: 11px;
    text-transform: uppercase;
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap::before {
    content: "🔍";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--ink);
    font: inherit;
    font-size: 13px;
    padding: 10px 14px 10px 36px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--neon); box-shadow: 0 0 12px rgba(0,255,208,0.2); }
  #search::placeholder { color: var(--dim); }

  .cats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .cat {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--dim);
    font: inherit;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat:hover, .cat.active {
    border-color: var(--neon);
    color: var(--neon);
    box-shadow: 0 0 10px rgba(0,255,208,0.25);
    background: rgba(0,255,208,0.07);
  }

  /* ── GRID ── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 96px;
  }
  .count {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .tile {
    position: relative;
    cursor: pointer;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .tile:hover {
    transform: translateY(-4px);
    border-color: var(--neon);
    box-shadow: 0 0 0 1px var(--neon), 0 0 24px rgba(0,255,208,0.3), 0 12px 40px rgba(0,0,0,0.6);
  }
  .tile[data-hidden] { display: none; }

  .art {
    aspect-ratio: 16 / 10;
    display: grid;
    place-items: center;
    font-size: 56px;
    background: linear-gradient(135deg, var(--c1, #222) 0%, var(--c2, #444) 100%);
    position: relative;
    overflow: hidden;
  }
  .art::after {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent 0 10px, rgba(0,0,0,0.08) 10px 20px);
    pointer-events: none;
  }
  .art span { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); z-index: 1; }

  .meta { padding: 12px 14px 16px; }
  .title {
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .tag {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .badge {
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--dim);
    text-transform: uppercase;
  }
  .badge.hot  { color: var(--neon3); border-color: var(--neon3); }
  .badge.new  { color: var(--neon);  border-color: var(--neon); }
  .badge.mp   { color: var(--neon2); border-color: var(--neon2); }
  .badge.tool { color: #60a5fa;      border-color: #60a5fa; }

  /* ── PLAYER ── */
  .player {
    position: fixed; inset: 0;
    background: #000;
    z-index: 2000;
    display: none;
    flex-direction: column;
  }
  .player.open { display: flex; }
  .bar {
    height: 44px;
    background: linear-gradient(180deg, #1a1a2a, #0a0a14);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .bar button {
    background: transparent;
    color: var(--ink);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .bar button:hover { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 12px rgba(0,255,208,0.3); }
  .bar .now { color: var(--dim); flex: 1; }
  .bar .now b { color: var(--neon); font-weight: normal; }
  iframe { flex: 1; width: 100%; border: 0; background: #000; }

  footer {
    text-align: center;
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 16px;
  }

  .empty {
    display: none;
    grid-column: 1/-1;
    text-align: center;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 0.2em;
    padding: 64px 0;
  }
</style>
</head>
<body>

<header>
  <h1>LEV ARCADE</h1>
  <p class="sub">Insert coin &middot; Press start</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <input id="search" type="search" placeholder="Search games…" autocomplete="off" spellcheck="false" />
  </div>
  <div class="cats" id="cats"></div>
</div>

<main>
  <div class="count" id="count"></div>
  <div class="grid" id="grid">
    <div class="empty" id="empty">No games found</div>
  </div>
</main>

<footer>&copy; A homemade arcade</footer>

<div class="player" id="player">
  <div class="bar">
    <button id="back">&larr; Back</button>
    <div class="now">Now playing &mdash; <b id="nowTitle"></b></div>
    <button id="fs">Fullscreen</button>
  </div>
  <iframe id="frame" allow="autoplay; fullscreen; gamepad; microphone; camera"></iframe>
</div>

<script>

  // ── SCI-FI / SPACE ──
  {

    file: "spaceship-solo.html",

    c1: "#0a0a2a", c2: "#312e81",
    cat: "Sci-Fi",
    badge: null,
    desc: "Solo spaceship action — upgrades with Q, no server needed.",
  },
  {
    title: "Spaceship",
    file: "spaceship.html",
    emoji: "🛸",
    c1: "#0d1a3a", c2: "#1e3a8a",
    cat: "Sci-Fi",
    badge: null,
    desc: "Original spaceship build.",
  },
  {
    title: "Spaceship MP",
    file: "spaceship-mp.html",
    emoji: "👾",
    c1: "#0a0a2a", c2: "#6d28d9",

  {

  {

    badge: "new",

  // ── STRATEGY / TYCOON ──
  {

    file: "mars-colony.html",

    c1: "#3b1c0a", c2: "#9a3412",

  {

  // ── PUZZLE / CASUAL ──
  {

  {

  // ── MUSIC / CREATIVE ──
  {

    desc: "Mix beats, scratch records, feel the drop.",
  },
  // ── HACKING / TOOLS ──
  {

    c1: "#064e3b", c2: "#10b981",
    cat: "Hacking",
    badge: null,
    desc: "Terminal hacking sim — break in, escalate, exfiltrate.",
  },
  {
    title: "Homework Bot",
    file: "homework-bot.html",
    emoji: "📚",
    c1: "#1e1b4b", c2: "#4338ca",
    cat: "Hacking",

    desc: "Auto-types Gemini answers into Google Classroom, Khan, Quizlet & more.",
  },
  {

    emoji: "🤖",
    c1: "#1e1b4b", c2: "#7c3aed",
    cat: "Hacking",
    badge: "tool",
    desc: "Web version of the homework bot.",
  },
  {
    title: "Homework Bot Bookmarklet",
    file: "homework-bot-bookmarklet.html",
    emoji: "🔖",
    c1: "#1e1b4b", c2: "#312e81",
    cat: "Hacking",
    badge: "tool",
    desc: "Drag-to-bookmarks version of the homework bot.",
  },
];

// ── BUILD CATEGORY PILLS ──
const allCats = ["All", ...new Set(games.map(g => g.cat))];
const catsEl = document.getElementById("cats");
let activeCat = "All";

for (const c of allCats) {
  const btn = document.createElement("button");
  btn.className = "cat" + (c === "All" ? " active" : "");
  btn.textContent = c;
  btn.addEventListener("click", () => {
    activeCat = c;
    document.querySelectorAll(".cat").forEach(b => b.classList.toggle("active", b.textContent === c));
    filter();
  });
  catsEl.appendChild(btn);
}

// ── BUILD TILES ──
const grid = document.getElementById("grid");
const tiles = [];

for (const g of games) {
  const tile = document.createElement("div");
  tile.className = "tile";
  tile.dataset.title = g.title.toLowerCase();
  tile.dataset.cat = g.cat;
  tile.innerHTML = `
    <div class="art" style="--c1:${g.c1};--c2:${g.c2}">
      <span>${g.emoji}</span>
    </div>
    <div class="meta">
      <div class="title">${g.title}</div>
      <div class="row">
        <span class="tag">${g.cat}</span>
        ${g.badge ? `<span class="badge ${g.badge}">${g.badge === "mp" ? "Multiplayer" : g.badge}</span>` : ""}
      </div>
    </div>
  `;
  tile.addEventListener("click", () => launch(g));
  grid.insertBefore(tile, document.getElementById("empty"));
  tiles.push(tile);
}

// ── FILTER ──
const countEl = document.getElementById("count");
const emptyEl = document.getElementById("empty");

function filter() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  let visible = 0;
  for (const tile of tiles) {
    const matchCat = activeCat === "All" || tile.dataset.cat === activeCat;
    const matchQ = !q || tile.dataset.title.includes(q);
    const show = matchCat && matchQ;
    tile.toggleAttribute("data-hidden", !show);
    if (show) visible++;
  }
  countEl.textContent = `${visible} game${visible !== 1 ? "s" : ""}`;
  emptyEl.style.display = visible === 0 ? "block" : "none";
}

document.getElementById("search").addEventListener("input", filter);
filter();

// ── PLAYER ──
const player = document.getElementById("player");
const frame  = document.getElementById("frame");
const nowTitle = document.getElementById("nowTitle");

function launch(g) {
  frame.src = g.file;
  nowTitle.textContent = g.title;
  player.classList.add("open");
  document.body.style.overflow = "hidden";
  location.hash = encodeURIComponent(g.title);
}
function closePlayer() {
  player.classList.remove("open");
  frame.src = "about:blank";
  document.body.style.overflow = "";
  if (location.hash) history.replaceState(null, "", location.pathname);
}

document.getElementById("back").addEventListener("click", closePlayer);
document.getElementById("fs").addEventListener("click", () => {
  if (!document.fullscreenElement) player.requestFullscreen?.();
  else document.exitFullscreen?.();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && player.classList.contains("open")) closePlayer();
});

// deep-link
if (location.hash) {
  const want = decodeURIComponent(location.hash.slice(1)).toLowerCase();
  const g = games.find(x => x.title.toLowerCase() === want);
  if (g) launch(g);
}
</script>
